<div class="min-h-screen relative flex items-center justify-center px-4 sm:px-6 lg:px-8 overflow-hidden">
  
  <!-- Glowing Spotlights in the background -->
  <div class="ambient-glow"></div>
  <div class="absolute w-[400px] h-[400px] rounded-full bg-indigo-500/10 blur-[120px] top-1/4 left-1/4 animate-pulse-slow"></div>
  <div class="absolute w-[350px] h-[350px] rounded-full bg-purple-500/10 blur-[100px] bottom-1/4 right-1/4 animate-float"></div>

  <!-- Content Card container -->
  <div class="max-w-md w-full space-y-8 glass-panel p-8 sm:p-10 rounded-2xl relative z-10 border border-slate-200 shadow-[0_0_50px_rgba(0,0,0,0.6)]">
    
    <!-- Header/Logo area -->
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 text-indigo-400 mb-4 animate-float">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 21m0 0-.762-.508m.762.508 1.444-2.407m3.111-2.989a8.125 8.125 0 0 0 1.488-4.482c0-3.32-2.73-6.02-6.1-6.02m0 0a6.115 6.115 0 0 0-4.73 2.247m4.73-2.247c.189.362.354.743.496 1.139m0 0c.277.77.411 1.57.411 2.378 0 1.948-.83 3.702-2.166 4.922m2.166-4.922c-.004.01-.008.02-.012.03m0 0M21 12c0 4.578-3.82 8.25-8.5 8.25-2.33 0-4.437-.905-5.972-2.379m0 0L3 18m0 0 1.344-2.457A8.192 8.192 0 0 1 3 12c0-4.578 3.82-8.25 8.5-8.25H12" />
        </svg>
      </div>
      <h2 class="text-3xl sm:text-4xl font-black tracking-tight text-slate-900 bg-clip-text bg-gradient-to-r from-indigo-200 via-indigo-500 to-purple-400">
        Service Desk
      </h2>
      <p class="mt-2 text-sm text-slate-400 font-medium">
        Portal de Soporte Corporativo
      </p>
    </div>

    <!-- Active Error Alerts -->
    <div *ngIf="errorMessage" class="flex items-start space-x-2 text-red-500 text-sm">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 flex-shrink-0 mt-0.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
      </svg>
      <span class="font-semibold">{{ errorMessage }}</span>
    </div>

    <!-- Reactive Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
      
      <div class="space-y-4">
        
        <!-- Input field Email -->
        <div>
          <label for="email" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Correo Electrónico</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
              </svg>
            </span>
            <input id="email" type="email" formControlName="email" 
                   class="glass-input block w-full pl-10 pr-3 py-3 rounded-xl sm:text-sm border-slate-300/50"
                   [ngClass]="{'border-red-500/50 focus:border-red-500': emailControl?.invalid && emailControl?.touched}"
                   placeholder="ejemplo@empresa.com">
          </div>
          <p *ngIf="emailControl?.invalid && emailControl?.touched" class="mt-2 text-xs text-red-400 font-medium flex items-center">
            <span class="mr-1 inline-block w-1 h-1 rounded-full bg-red-400"></span>
            Por favor, ingresa un correo corporativo válido.
          </p>
        </div>

        <!-- Input field Password -->
        <div>
          <label for="password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Contraseña</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
              </svg>
            </span>
            <input id="password" [type]="showPassword ? 'text' : 'password'" formControlName="password" 
                   class="glass-input block w-full pl-10 pr-10 py-3 rounded-xl sm:text-sm border-slate-300/50"
                   [ngClass]="{'border-red-500/50 focus:border-red-500': passwordControl?.invalid && passwordControl?.touched}"
                   placeholder="••••••••">
            <button type="button" (click)="togglePasswordVisibility()" 
                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-indigo-400 transition-colors focus:outline-none"
                    title="Mostrar/Ocultar contraseña">
              <!-- Eye icon (shown when password is hidden) -->
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
              <!-- Eye-slash icon (shown when password is visible) -->
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.808 7.808 3.158 3.158m-3.158-3.158-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
          <p *ngIf="passwordControl?.invalid && passwordControl?.touched" class="mt-2 text-xs text-red-400 font-medium flex items-center">
            <span class="mr-1 inline-block w-1 h-1 rounded-full bg-red-400"></span>
            La contraseña debe tener al menos 5 caracteres.
          </p>
        </div>
      </div>

      <div class="space-y-4 pt-2">
        <!-- Submit Button -->
        <button type="submit" [disabled]="isLoading"
                class="w-full flex justify-center items-center py-3 px-4 border border-indigo-500/30 text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-500 shadow-[0_0_20px_rgba(99,102,241,0.3)] hover:shadow-[0_0_30px_rgba(99,102,241,0.5)] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!isLoading" class="flex items-center">
            Iniciar Sesión
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 ml-2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
            </svg>
          </span>
          <span *ngIf="isLoading" class="flex items-center">
            <svg class="animate-spin h-5 w-5 mr-2 text-slate-900" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Autenticando...
          </span>
        </button>

      </div>

    </form>
  </div>
</div>
